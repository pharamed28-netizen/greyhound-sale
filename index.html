<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a1a1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Greyhound Staff Sale 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f0f;
  --surface: #1c1c1c;
  --surface2: #252525;
  --border: rgba(255,255,255,0.08);
  --accent: #c8f03a;
  --accent-dim: rgba(200,240,58,0.12);
  --red: #ff5c5c;
  --red-dim: rgba(255,92,92,0.12);
  --text: #f0f0f0;
  --text2: #888;
  --text3: #555;
  --radius: 16px;
  --radius-sm: 10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Sarabun', sans-serif; overscroll-behavior: none; }

body { display: flex; flex-direction: column; max-width: 480px; margin: 0 auto; min-height: 100vh; }

.header {
  padding: 16px 20px 12px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.header-left { display: flex; flex-direction: column; }
.brand { font-family: 'Space Mono', monospace; font-size: 13px; font-weight: 700; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; }
.header-title { font-size: 18px; font-weight: 600; color: var(--text); margin-top: 2px; }
.sale-badge {
  background: var(--accent); color: #111; font-size: 11px; font-weight: 600;
  padding: 4px 10px; border-radius: 20px; font-family: 'Space Mono', monospace; white-space: nowrap;
}

.main { flex: 1; padding: 20px; display: flex; flex-direction: column; gap: 16px; }

.scan-area {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}

#video-container {
  position: relative; width: 100%; aspect-ratio: 4/3; background: #000; display: none;
}
#video { width: 100%; height: 100%; object-fit: cover; display: block; }
.scan-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(rgba(0,0,0,0.3) 0%, transparent 30%, transparent 70%, rgba(0,0,0,0.3) 100%);
}
.scan-frame-wrap {
  position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
}
.scan-frame {
  width: 62%; aspect-ratio: 2.5/1;
  border: 2px solid var(--accent);
  border-radius: 8px;
  position: relative;
}
.scan-line {
  position: absolute; left: 6px; right: 6px; height: 2px;
  background: var(--accent); opacity: 0.8;
  animation: sweep 2s ease-in-out infinite;
  box-shadow: 0 0 8px var(--accent);
}
@keyframes sweep { 0%,100%{top:10%} 50%{top:82%} }

.scan-btn-area { padding: 16px; }
.scan-btn {
  width: 100%; padding: 14px;
  background: var(--accent); color: #111;
  border: none; border-radius: var(--radius-sm);
  font-family: 'Sarabun', sans-serif; font-size: 16px; font-weight: 600;
  cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
  transition: opacity 0.15s, transform 0.1s;
}
.scan-btn:active { transform: scale(0.97); opacity: 0.9; }
.scan-btn.stop {
  background: var(--surface2); color: var(--text2); border: 1px solid var(--border);
}
.scan-btn svg { width: 20px; height: 20px; flex-shrink: 0; }

.status-bar {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 16px; font-size: 13px; color: var(--text2);
  border-top: 1px solid var(--border);
}
.status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text3); flex-shrink: 0; }
.status-dot.scanning { background: var(--accent); animation: pulse 1.2s ease-in-out infinite; }
.status-dot.error { background: var(--red); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

.divider { display: flex; align-items: center; gap: 10px; }
.divider span { font-size: 12px; color: var(--text3); white-space: nowrap; }
.divider::before, .divider::after { content:''; flex:1; height:1px; background: var(--border); }

.manual-section { display: flex; flex-direction: column; gap: 8px; }
.input-group { display: flex; gap: 8px; }
.sku-input {
  flex: 1; padding: 13px 14px;
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm);
  color: var(--text); font-family: 'Space Mono', monospace; font-size: 14px;
  outline: none; transition: border-color 0.2s;
}
.sku-input:focus { border-color: rgba(200,240,58,0.4); }
.sku-input::placeholder { font-family: 'Sarabun', sans-serif; color: var(--text3); }
.lookup-btn {
  padding: 13px 18px; background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text); font-family: 'Sarabun', sans-serif;
  font-size: 14px; font-weight: 500; cursor: pointer; white-space: nowrap;
  transition: background 0.15s, transform 0.1s;
}
.lookup-btn:active { transform: scale(0.96); background: #333; }

.result-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden; display: none;
}
.result-header {
  padding: 14px 16px;
  background: var(--accent-dim); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.result-sku { font-family: 'Space Mono', monospace; font-size: 13px; color: var(--accent); font-weight: 700; }
.result-tag { font-size: 11px; color: var(--text2); background: var(--surface2); padding: 3px 8px; border-radius: 20px; }

.result-body { padding: 16px; display: flex; flex-direction: column; gap: 10px; }
.result-row { display: flex; justify-content: space-between; align-items: center; font-size: 14px; }
.result-label { color: var(--text2); }
.result-value { font-weight: 500; color: var(--text); text-align: right; max-width: 60%; }

.price-highlight {
  background: var(--surface2); border-radius: var(--radius-sm);
  padding: 14px 16px; display: flex; justify-content: space-between; align-items: center;
  border: 1px solid rgba(200,240,58,0.2);
}
.price-highlight .label { font-size: 13px; color: var(--text2); }
.price-highlight .amount { font-family: 'Space Mono', monospace; font-size: 26px; font-weight: 700; color: var(--accent); }

.saving-row {
  display: flex; justify-content: space-between; align-items: center;
  background: var(--red-dim); border-radius: var(--radius-sm);
  padding: 10px 14px; font-size: 13px;
}
.saving-row .label { color: var(--text2); }
.saving-row .amount { color: var(--red); font-weight: 600; }

.price-input-row {
  display: flex; gap: 8px; align-items: center; margin-top: 4px;
}
.price-input-row label { font-size: 13px; color: var(--text2); white-space: nowrap; }
.price-input {
  flex: 1; padding: 11px 12px;
  background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm);
  color: var(--text); font-family: 'Space Mono', monospace; font-size: 15px;
  outline: none; transition: border-color 0.2s;
}
.price-input:focus { border-color: rgba(200,240,58,0.4); }
.price-unit { font-size: 13px; color: var(--text2); }

.error-box {
  background: var(--red-dim); border: 1px solid rgba(255,92,92,0.2);
  border-radius: var(--radius-sm); padding: 12px 14px;
  font-size: 13px; color: var(--red); display: none;
}

.footer {
  padding: 14px 20px;
  border-top: 1px solid var(--border);
  font-size: 11px; color: var(--text3); text-align: center;
  line-height: 1.6;
}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <span class="brand">GREYHOUND</span>
    <span class="header-title">Staff Sale Checker</span>
  </div>
  <span class="sale-badge">5–14 JUN 2026</span>
</div>

<div class="main">

  <div class="scan-area">
    <div id="video-container">
      <video id="video" autoplay muted playsinline></video>
      <div class="scan-overlay"></div>
      <div class="scan-frame-wrap">
        <div class="scan-frame"><div class="scan-line"></div></div>
      </div>
    </div>
    <div class="scan-btn-area">
      <button class="scan-btn" id="btn-scan" onclick="toggleScan()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><line x1="14" y1="14" x2="21" y2="14"/><line x1="21" y1="14" x2="21" y2="21"/><line x1="14" y1="21" x2="21" y2="21"/></svg>
        สแกนบาร์โค้ด
      </button>
    </div>
    <div class="status-bar">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-text">พร้อมใช้งาน — จ่อกล้องไปที่บาร์โค้ดบนแท็ก</span>
    </div>
  </div>

  <div class="divider"><span>หรือพิมพ์ SKU เอง</span></div>

  <div class="manual-section">
    <div class="input-group">
      <input class="sku-input" id="sku-input" placeholder="A25GB33013GY1A" autocomplete="off" autocorrect="off" spellcheck="false" />
      <button class="lookup-btn" onclick="lookupManual()">เช็คราคา</button>
    </div>
  </div>

  <div class="error-box" id="error-box"></div>

  <div class="result-card" id="result-card">
    <div class="result-header">
      <span class="result-sku" id="r-sku"></span>
      <span class="result-tag" id="r-tag"></span>
    </div>
    <div class="result-body">
      <div class="result-row">
        <span class="result-label">Season / Brand</span>
        <span class="result-value" id="r-season"></span>
      </div>
      <div class="result-row" id="orig-row">
        <span class="result-label">ราคาป้าย</span>
        <span class="result-value" id="r-orig"></span>
      </div>
      <div class="result-row" id="disc-row">
        <span class="result-label">ส่วนลด</span>
        <span class="result-value" id="r-disc"></span>
      </div>

      <div id="price-input-section" style="display:none">
        <div class="price-input-row">
          <label>ราคาป้าย</label>
          <input class="price-input" id="price-val" type="number" placeholder="0" inputmode="numeric" oninput="applyPrice()" />
          <span class="price-unit">บาท</span>
        </div>
      </div>

      <div class="price-highlight">
        <span class="label">ราคาที่ต้องจ่าย</span>
        <span class="amount" id="r-final">—</span>
      </div>
      <div class="saving-row" id="saving-row" style="display:none">
        <span class="label">ประหยัดได้</span>
        <span class="amount" id="r-saving"></span>
      </div>
    </div>
  </div>

</div>

<div class="footer">
  Mud&amp;Hound Plaza ชั้น 1 &nbsp;·&nbsp; ข้อมูล ณ 5 มิ.ย. 2026<br>
  ราคาอาจมีการเปลี่ยนแปลง กรุณายืนยันกับพนักงานอีกครั้ง
</div>

<script src="https://unpkg.com/@zxing/library@0.19.1/umd/index.min.js"></script>
<script>
var scanning = false, codeReader = null, activeStream = null, pendingRule = null;

function fmt(n){ return n.toLocaleString('th-TH',{minimumFractionDigits:2,maximumFractionDigits:2}); }

function parseSKU(raw){
  var sku = raw.trim().toUpperCase();
  var s = sku.charAt(0);
  var y = parseInt(sku.substring(1,3));
  var b = sku.substring(3,5);
  var season='', disc=null, fixed=null;

  if(s==='A'&&y===25){
    if(['GB','GE','GO','GT','MO','OG'].indexOf(b)>=0){disc=70;season='A25 · Greyhound';}
    else if(['GD','MB','MD','ME','MF','ML','MP','MS'].indexOf(b)>=0){disc=60;season='A25 · Smileyhound';}
    else if(b==='CO'||sku.indexOf('COPENN')>=0){disc=50;season='A25 · Extra Copenn.';}
    else if(sku.indexOf('ME09012')>=0){fixed=1590;season='A25 · รองเท้าผ้าใบ Extra';}
  } else if(s==='S'&&y===25){
    if(['GA','GE','GO','MO','OG'].indexOf(b)>=0){disc=70;season='S25 · Greyhound';}
    else if(['MD','ME','MF','ML'].indexOf(b)>=0){disc=60;season='S25 · Smileyhound';}
  } else if(s==='S'&&y===26){
    if(b==='FN'){
      if(sku.indexOf('02013')>=0){fixed=50;season='Year 26 · GH FN · เสื้อผ้า';}
      else if(sku.indexOf('14013')>=0){fixed=25;season='Year 26 · GH FN · Accessories';}
      else{fixed=50;season='Year 26 · Greyhound FN';}
    }
  } else if(s==='E'&&y===24){
    if(['GA','GE','GT','GO','MO','OG'].indexOf(b)>=0){disc=80;season='Year 24 · Greyhound';}
    else if(['MD','ME','MF','ML','MP','MS'].indexOf(b)>=0){disc=70;season='Year 24 · Smileyhound';}
  }

  if(!season) return null;
  return {disc:disc, fixed:fixed, season:season};
}

function showResult(sku, rule){
  document.getElementById('error-box').style.display='none';
  var card = document.getElementById('result-card');
  card.style.display='block';
  document.getElementById('r-sku').textContent = sku;
  document.getElementById('r-season').textContent = rule.season;

  if(rule.fixed!==null){
    document.getElementById('r-tag').textContent = 'ราคาคงที่';
    document.getElementById('orig-row').style.display='none';
    document.getElementById('disc-row').style.display='none';
    document.getElementById('price-input-section').style.display='none';
    document.getElementById('r-final').textContent = '฿'+fmt(rule.fixed);
    document.getElementById('saving-row').style.display='none';
    pendingRule = null;
  } else {
    document.getElementById('r-tag').textContent = 'ลด '+rule.disc+'%';
    document.getElementById('orig-row').style.display='flex';
    document.getElementById('disc-row').style.display='flex';
    document.getElementById('r-disc').textContent = rule.disc+'%';
    document.getElementById('price-input-section').style.display='block';
    document.getElementById('r-final').textContent = '—';
    document.getElementById('saving-row').style.display='none';
    document.getElementById('r-orig').textContent = '—';
    pendingRule = rule;
    var pv = document.getElementById('price-val');
    pv.value = '';
    setTimeout(function(){ pv.focus(); }, 200);
  }
  card.scrollIntoView({behavior:'smooth', block:'nearest'});
}

function applyPrice(){
  if(!pendingRule) return;
  var orig = parseFloat(document.getElementById('price-val').value);
  if(!orig||orig<=0){
    document.getElementById('r-orig').textContent='—';
    document.getElementById('r-final').textContent='—';
    document.getElementById('saving-row').style.display='none';
    return;
  }
  var discAmt = orig * pendingRule.disc / 100;
  var finalP = orig - discAmt;
  document.getElementById('r-orig').textContent = '฿'+fmt(orig);
  document.getElementById('r-disc').textContent = pendingRule.disc+'% (฿'+fmt(discAmt)+')';
  document.getElementById('r-final').textContent = '฿'+fmt(finalP);
  document.getElementById('r-saving').textContent = '฿'+fmt(discAmt);
  document.getElementById('saving-row').style.display='flex';
}

function lookupManual(){
  var val = document.getElementById('sku-input').value.trim();
  if(!val){ showError('กรุณากรอก SKU จากแท็กสินค้า'); return; }
  var rule = parseSKU(val);
  if(!rule){ showError('ไม่พบ "'+val+'" ในตาราง Staff Sale\nลองตรวจสอบ SKU อีกครั้ง หรือสอบถามพนักงาน'); return; }
  showResult(val, rule);
}

function showError(msg){
  var eb = document.getElementById('error-box');
  eb.textContent = msg; eb.style.display='block';
  document.getElementById('result-card').style.display='none';
}

function setStatus(text, state){
  document.getElementById('status-text').textContent = text;
  var dot = document.getElementById('status-dot');
  dot.className = 'status-dot'+(state?' '+state:'');
}

function toggleScan(){
  if(scanning){ stopScan(); } else { startScan(); }
}

async function startScan(){
  setStatus('กำลังเปิดกล้อง...','scanning');
  document.getElementById('video-container').style.display='block';
  var btn = document.getElementById('btn-scan');
  btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>ปิดกล้อง';
  btn.classList.add('stop');
  scanning = true;

  try {
    activeStream = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode:{ideal:'environment'}, width:{ideal:1280}, height:{ideal:720} }
    });
    var video = document.getElementById('video');
    video.srcObject = activeStream;
    await video.play();

    if(typeof ZXing==='undefined'){
      setStatus('โหลด barcode library...','scanning');
      await new Promise(function(r){setTimeout(r,1500);});
    }

    var hints = new Map();
    hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS,[
      ZXing.BarcodeFormat.CODE_128, ZXing.BarcodeFormat.CODE_39,
      ZXing.BarcodeFormat.EAN_13, ZXing.BarcodeFormat.ITF
    ]);
    codeReader = new ZXing.BrowserMultiFormatReader(hints);
    setStatus('จ่อกล้องไปที่บาร์โค้ดบนแท็กสินค้า','scanning');

    codeReader.decodeFromVideoElement(video, function(result, err){
      if(result){
        var text = result.getText();
        document.getElementById('sku-input').value = text;
        var rule = parseSKU(text);
        if(rule){
          setStatus('สแกนได้: '+text,'');
          showResult(text, rule);
          stopScan();
        } else {
          setStatus('ไม่พบ: '+text+' — ลองใหม่','error');
        }
      }
    });
  } catch(e){
    setStatus('ไม่สามารถเปิดกล้องได้: '+e.message,'error');
    stopScan();
  }
}

function stopScan(){
  scanning = false;
  if(codeReader){ try{codeReader.reset();}catch(x){} codeReader=null; }
  if(activeStream){ activeStream.getTracks().forEach(function(t){t.stop();}); activeStream=null; }
  document.getElementById('video-container').style.display='none';
  var btn = document.getElementById('btn-scan');
  btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><line x1="14" y1="14" x2="21" y2="14"/><line x1="21" y1="14" x2="21" y2="21"/><line x1="14" y1="21" x2="21" y2="21"/></svg>สแกนบาร์โค้ด';
  btn.classList.remove('stop');
  setStatus('พร้อมใช้งาน — จ่อกล้องไปที่บาร์โค้ดบนแท็ก','');
}

document.getElementById('sku-input').addEventListener('keydown', function(e){
  if(e.key==='Enter'){ e.preventDefault(); lookupManual(); }
});
</script>
</body>
</html>
